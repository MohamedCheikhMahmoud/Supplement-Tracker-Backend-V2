name: Backend Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run Backend Tests
        run: ./gradlew test

      - name: Build Backend
        run: ./gradlew build
